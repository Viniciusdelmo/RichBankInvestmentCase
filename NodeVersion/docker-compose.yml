services:
  postgres:
    image: postgres:16-alpine
    container_name: richbank-investment-node-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: richbank-node
    ports:
      - 5432:5432
    volumes:
      - richbank-node-postgres-data:/var/lib/postgresql/data

volumes:
  richbank-node-postgres-data:
    driver: local